<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dinesh's Money Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#15301f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Money Tracker">
<style>
  html, body { margin:0; padding:0; background:#15301f; }
</style>
</head>
<body>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap');

.tracker-app * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
.tracker-app {
  --ink: #211f1a;
  --muted: #6f6657;
  --cover: #15301f;
  --cover-light: #244a32;
  --paper: #f8f2e3;
  --paper-line: #ddd2b3;
  --rust: #b3502f;
  --gold: #b9842c;
  --brick: #9c3f33;
  --sage: #4f6e49;
  --sage-light: #e3ead9;
  --brick-light: #f3e2de;
  font-family: 'Inter', sans-serif;
  color: var(--ink);
  width: 100%;
  min-height: 100vh;
  background: var(--paper);
  border-radius: 0;
  overflow: hidden;
  box-shadow: none;
  position: relative;
}
@media (min-width: 480px) {
  .tracker-app {
    max-width: 430px;
    margin: 24px auto;
    min-height: auto;
    border-radius: 16px;
    box-shadow: 0 0 0 1px var(--paper-line), 0 14px 30px rgba(20,18,14,0.14);
  }
}

.mono { font-family: 'IBM Plex Mono', monospace; }

/* ---- Header ---- */
.tk-head {
  background: linear-gradient(165deg, var(--cover), var(--cover-light));
  color: #f3ead2;
  padding: 18px 18px 16px;
}
.tk-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 19px; margin: 0 0 12px; }
.tk-month {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  padding: 6px 6px 6px 14px;
}
.tk-month-label { font-family: 'IBM Plex Mono', monospace; font-weight: 600; font-size: 14px; }
.tk-arrow {
  background: rgba(255,255,255,0.12);
  border: none; color: #f3ead2; width: 30px; height: 30px;
  border-radius: 8px; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.tk-arrow:hover { background: rgba(255,255,255,0.22); }
.tk-cat-link { background:none; border:none; color:#cdbb8c; font-size:11.5px; text-decoration:underline; cursor:pointer; padding:10px 0 0; }

/* ---- Summary ---- */
.tk-summary { display: flex; gap: 10px; padding: 14px 16px; }
.tk-card { flex: 1; background: #fffdf7; border: 1px solid var(--paper-line); border-radius: 10px; padding: 10px 12px; }
.tk-card .lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
.tk-card .amt { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 15px; margin-top: 3px; }
.tk-card.income .amt { color: var(--sage); }
.tk-card.expense .amt { color: var(--brick); }
.tk-card.net .amt { color: var(--ink); }

/* ---- Add button ---- */
.tk-add-btn {
  display: block; width: calc(100% - 32px); margin: 4px 16px 16px;
  background: var(--rust); color: #fff7ef; border: none;
  padding: 12px; border-radius: 10px; font-weight: 600; font-size: 14px;
  font-family: 'Inter', sans-serif; cursor: pointer;
}
.tk-add-btn:active { transform: scale(0.98); }

/* ---- Breakdown ---- */
.tk-section { padding: 4px 16px 14px; }
.tk-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
.tk-tab {
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  background: #fffdf7; border: 1px solid var(--paper-line); color: var(--muted);
  padding: 6px 12px; border-radius: 999px; cursor: pointer;
}
.tk-tab.active { background: var(--ink); color: #f8f2e3; border-color: var(--ink); }
.tk-bd-row { margin-bottom: 9px; }
.tk-bd-top { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 4px; }
.tk-bd-name { display: flex; align-items: center; gap: 6px; font-weight: 600; }
.tk-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.tk-bd-amt { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.tk-bd-track { background: #ece3cb; border-radius: 5px; height: 7px; overflow: hidden; }
.tk-bd-fill { height: 100%; border-radius: 5px; }
.tk-empty { font-size: 12.5px; color: var(--muted); font-style: italic; text-align: center; padding: 14px 0; }

/* ---- Transactions ---- */
.tk-day-group { margin-bottom: 4px; }
.tk-day-label {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  padding: 10px 16px 4px; background: var(--paper);
}
.tk-tx {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; border-bottom: 1px dashed var(--paper-line);
  background: var(--paper);
}
.tk-tx-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.tk-tx-body { flex: 1; min-width: 0; }
.tk-tx-cat { font-size: 13px; font-weight: 600; }
.tk-tx-note { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tk-tx-amt { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 13.5px; white-space: nowrap; }
.tk-tx-amt.income { color: var(--sage); }
.tk-tx-amt.expense { color: var(--brick); }
.tk-del {
  background: none; border: none; color: var(--muted); font-size: 11px;
  padding: 4px 7px; border-radius: 6px; cursor: pointer; flex-shrink: 0;
}
.tk-del.confirm { background: var(--brick-light); color: var(--brick); font-weight: 600; }

/* ---- Modal ---- */
.tk-overlay {
  position: fixed; inset: 0; background: rgba(20,18,14,0.55);
  display: none; align-items: flex-end; justify-content: center; z-index: 50;
}
.tk-overlay.show { display: flex; }
.tk-modal {
  background: var(--paper); width: 100%; max-width: 430px;
  border-radius: 18px 18px 0 0; padding: 18px 18px 22px;
  max-height: 86vh; overflow-y: auto;
}
.tk-modal h3 { font-family: 'Fraunces', serif; font-size: 17px; margin: 0 0 14px; }
.tk-toggle { display: flex; gap: 8px; margin-bottom: 16px; }
.tk-toggle button {
  flex: 1; padding: 10px; border-radius: 9px; border: 1px solid var(--paper-line);
  background: #fffdf7; font-weight: 600; font-size: 13px; cursor: pointer; color: var(--muted);
}
.tk-toggle button.sel.income { background: var(--sage-light); border-color: var(--sage); color: var(--sage); }
.tk-toggle button.sel.expense { background: var(--brick-light); border-color: var(--brick); color: var(--brick); }
.tk-field { margin-bottom: 14px; }
.tk-field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
.tk-amt-input {
  font-family: 'IBM Plex Mono', monospace; font-size: 24px; font-weight: 700;
  border: none; border-bottom: 2px solid var(--rust); background: transparent;
  width: 100%; padding: 4px 2px; outline: none;
}
.tk-text-input, .tk-date-input {
  width: 100%; font-family: 'Inter', sans-serif; font-size: 14px;
  border: 1px solid var(--paper-line); border-radius: 8px; padding: 9px 10px;
  background: #fffdf7; outline: none;
}
.tk-chip-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.tk-chip {
  font-size: 12.5px; padding: 7px 12px; border-radius: 999px;
  border: 1px solid var(--paper-line); background: #fffdf7; color: var(--ink); cursor: pointer;
}
.tk-chip.sel { background: var(--ink); color: var(--paper); border-color: var(--ink); }
.tk-chip.add-new { border-style: dashed; color: var(--muted); }
.tk-modal-actions { display: flex; gap: 10px; margin-top: 6px; }
.tk-btn {
  flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
  font-weight: 600; font-size: 14px; font-family: 'Inter', sans-serif;
}
.tk-btn.primary { background: var(--rust); color: #fff7ef; }
.tk-btn.ghost { background: none; border: 1px solid var(--paper-line); color: var(--muted); }

.tk-cat-col { margin-bottom: 16px; }
.tk-cat-col h4 { font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 0 0 8px; }
.tk-cat-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; background: #fffdf7; border: 1px solid var(--paper-line);
  border-radius: 8px; margin-bottom: 6px; font-size: 13px;
}
.tk-cat-item button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; }
.tk-cat-add { display: flex; gap: 8px; margin-top: 6px; }
.tk-cat-add input { flex: 1; }
</style>

<div class="tracker-app">

  <div class="tk-head">
    <div class="tk-title">Dinesh's Money Tracker</div>
    <div class="tk-month">
      <button class="tk-arrow" id="prevMonth">&#8249;</button>
      <span class="tk-month-label" id="monthLabel">June 2026</span>
      <button class="tk-arrow" id="nextMonth">&#8250;</button>
    </div>
    <button class="tk-cat-link" id="openCats">Manage categories</button>
  </div>

  <div class="tk-summary">
    <div class="tk-card income"><div class="lbl">Income</div><div class="amt" id="sumIncome">&#8377;0</div></div>
    <div class="tk-card expense"><div class="lbl">Expense</div><div class="amt" id="sumExpense">&#8377;0</div></div>
    <div class="tk-card net"><div class="lbl">Net</div><div class="amt" id="sumNet">&#8377;0</div></div>
  </div>

  <button class="tk-add-btn" id="openAdd">+ Add Transaction</button>

  <div class="tk-section">
    <div class="tk-tabs">
      <button class="tk-tab active" data-tab="expense">Where it went</button>
      <button class="tk-tab" data-tab="income">Where it came from</button>
    </div>
    <div id="breakdown"></div>
  </div>

  <div id="txList"></div>

  <!-- ADD TRANSACTION MODAL -->
  <div class="tk-overlay" id="addOverlay">
    <div class="tk-modal">
      <h3>Add Transaction</h3>
      <div class="tk-toggle">
        <button id="toggleIncome" class="sel income">Income</button>
        <button id="toggleExpense">Expense</button>
      </div>
      <div class="tk-field">
        <label>Amount</label>
        <div style="display:flex; align-items:center; gap:6px;">
          <span class="mono" style="font-size:22px; color:var(--rust);">&#8377;</span>
          <input type="number" class="tk-amt-input" id="txAmount" placeholder="0" min="0">
        </div>
      </div>
      <div class="tk-field">
        <label>Category</label>
        <div class="tk-chip-grid" id="txCatChips"></div>
      </div>
      <div class="tk-field" id="newCatField" style="display:none;">
        <label>New category name</label>
        <input type="text" class="tk-text-input" id="newCatInput" placeholder="e.g. Travel">
      </div>
      <div class="tk-field">
        <label>Note (optional)</label>
        <input type="text" class="tk-text-input" id="txNote" placeholder="e.g. Quallie.AI payment">
      </div>
      <div class="tk-field">
        <label>Date</label>
        <input type="date" class="tk-date-input" id="txDate">
      </div>
      <div class="tk-modal-actions">
        <button class="tk-btn ghost" id="cancelAdd">Cancel</button>
        <button class="tk-btn primary" id="saveAdd">Save</button>
      </div>
    </div>
  </div>

  <!-- MANAGE CATEGORIES MODAL -->
  <div class="tk-overlay" id="catOverlay">
    <div class="tk-modal">
      <h3>Manage Categories</h3>
      <div class="tk-cat-col">
        <h4>Income</h4>
        <div id="incomeCatList"></div>
        <div class="tk-cat-add">
          <input type="text" class="tk-text-input" id="newIncomeCat" placeholder="Add income category">
          <button class="tk-btn primary" style="flex:none; padding:9px 14px;" id="addIncomeCat">Add</button>
        </div>
      </div>
      <div class="tk-cat-col">
        <h4>Expense</h4>
        <div id="expenseCatList"></div>
        <div class="tk-cat-add">
          <input type="text" class="tk-text-input" id="newExpenseCat" placeholder="Add expense category">
          <button class="tk-btn primary" style="flex:none; padding:9px 14px;" id="addExpenseCat">Add</button>
        </div>
      </div>
      <div class="tk-cat-col">
        <h4>Backup</h4>
        <div class="tk-modal-actions">
          <button class="tk-btn ghost" id="exportData">Export backup (.json)</button>
          <button class="tk-btn ghost" id="importTrigger">Import backup</button>
        </div>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
        <div style="font-size:11px; color:var(--muted); margin-top:6px;">Data lives only on this device/browser. Export a backup now and then so you never lose it.</div>
      </div>
      <div class="tk-modal-actions">
        <button class="tk-btn ghost" id="closeCats" style="flex:1;">Done</button>
      </div>
    </div>
  </div>

</div>

<script>
  // Local-storage backed shim so the tracker works as a standalone app
  // (mirrors the get/set/delete/list shape the tracker code expects)
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem('store:'+key);
      if (raw === null) throw new Error('not found');
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem('store:'+key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem('store:'+key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const p = 'store:' + (prefix || '');
      const keys = Object.keys(localStorage).filter(k => k.startsWith(p)).map(k => k.slice(6));
      return { keys, prefix, shared: !!shared };
    }
  };
</script>
<script>
(function(){
  const root = document;
  const $ = (id) => root.getElementById(id);
  const STORAGE_KEY = 'dinesh-tracker-v1';
  const PALETTE = ['#b3502f','#b9842c','#4f6e49','#5b7fa6','#8a5fa3','#c2785c','#3f8f86','#a14b6d','#7d8c3c','#bb6b9b'];

  const defaultState = {
    transactions: [],
    incomeCategories: ['Bookifyreach','Fiverr','Other'],
    expenseCategories: ['Rent','Mom/Family','Food','Transport','Bills','Shopping','Savings/Investment','Tax','Other'],
    nextId: 1
  };

  let state = JSON.parse(JSON.stringify(defaultState));
  let viewYear, viewMonth; // 0-indexed month
  let activeTab = 'expense';
  let modalType = 'income';
  let modalCategory = null;

  const today = new Date();
  viewYear = today.getFullYear();
  viewMonth = today.getMonth();

  function fmt(n){
    n = Math.round(n);
    const sign = n < 0 ? '-' : '';
    return sign + '\u20B9' + Math.abs(n).toLocaleString('en-IN');
  }

  function colorFor(catList, name){
    const idx = catList.indexOf(name);
    return PALETTE[(idx >= 0 ? idx : 0) % PALETTE.length];
  }

  function monthLabel(y,m){
    return new Date(y,m,1).toLocaleString('en-US',{month:'long', year:'numeric'});
  }

  function txInView(){
    return state.transactions.filter(t => {
      const d = new Date(t.date);
      return d.getFullYear() === viewYear && d.getMonth() === viewMonth;
    });
  }

  function render(){
    $('monthLabel').textContent = monthLabel(viewYear, viewMonth);
    const txs = txInView();

    let income = 0, expense = 0;
    txs.forEach(t => { if (t.type === 'income') income += t.amount; else expense += t.amount; });
    $('sumIncome').textContent = fmt(income);
    $('sumExpense').textContent = fmt(expense);
    $('sumNet').textContent = fmt(income - expense);

    renderBreakdown(txs, income, expense);
    renderTxList(txs);
  }

  function renderBreakdown(txs, incomeTotal, expenseTotal){
    const type = activeTab;
    const cats = type === 'income' ? state.incomeCategories : state.expenseCategories;
    const total = type === 'income' ? incomeTotal : expenseTotal;
    const sums = {};
    txs.filter(t => t.type === type).forEach(t => {
      sums[t.category] = (sums[t.category] || 0) + t.amount;
    });
    const entries = Object.keys(sums).map(name => ({name, amt: sums[name]})).sort((a,b)=>b.amt-a.amt);
    const box = $('breakdown');
    box.innerHTML = '';
    if (entries.length === 0){
      box.innerHTML = '<div class="tk-empty">No ' + type + ' logged this month yet.</div>';
      return;
    }
    entries.forEach(e => {
      const pct = total > 0 ? (e.amt/total*100) : 0;
      const color = colorFor(cats, e.name);
      const row = document.createElement('div');
      row.className = 'tk-bd-row';
      row.innerHTML =
        '<div class="tk-bd-top"><span class="tk-bd-name"><span class="tk-dot" style="background:'+color+'"></span>'+e.name+'</span>' +
        '<span class="tk-bd-amt">'+fmt(e.amt)+'</span></div>' +
        '<div class="tk-bd-track"><div class="tk-bd-fill" style="width:'+pct+'%; background:'+color+'"></div></div>';
      box.appendChild(row);
    });
  }

  function renderTxList(txs){
    const list = $('txList');
    list.innerHTML = '';
    if (txs.length === 0){
      list.innerHTML = '<div class="tk-empty">No transactions yet this month — tap "+ Add Transaction" to start.</div>';
      return;
    }
    const sorted = [...txs].sort((a,b) => new Date(b.date) - new Date(a.date) || b.id - a.id);
    const groups = {};
    sorted.forEach(t => {
      const key = t.date;
      (groups[key] = groups[key] || []).push(t);
    });
    Object.keys(groups).sort((a,b) => new Date(b)-new Date(a)).forEach(dateKey => {
      const dLabel = new Date(dateKey).toLocaleDateString('en-US', {day:'numeric', month:'short'});
      const dayWrap = document.createElement('div');
      dayWrap.className = 'tk-day-group';
      dayWrap.innerHTML = '<div class="tk-day-label">' + dLabel + '</div>';
      groups[dateKey].forEach(t => {
        const cats = t.type === 'income' ? state.incomeCategories : state.expenseCategories;
        const color = colorFor(cats, t.category);
        const row = document.createElement('div');
        row.className = 'tk-tx';
        row.innerHTML =
          '<span class="tk-tx-dot" style="background:'+color+'"></span>' +
          '<div class="tk-tx-body"><div class="tk-tx-cat">'+t.category+'</div>' +
          (t.note ? '<div class="tk-tx-note">'+t.note+'</div>' : '') + '</div>' +
          '<div class="tk-tx-amt '+t.type+'">'+(t.type==='income'?'+':'-')+fmt(t.amount).replace('-','')+'</div>' +
          '<button class="tk-del" data-id="'+t.id+'">&times;</button>';
        dayWrap.appendChild(row);
      });
      list.appendChild(dayWrap);
    });

    list.querySelectorAll('.tk-del').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.classList.contains('confirm')){
          state.transactions = state.transactions.filter(t => t.id !== Number(btn.dataset.id));
          persist(); render();
        } else {
          btn.classList.add('confirm');
          btn.textContent = 'Delete?';
          setTimeout(() => { btn.classList.remove('confirm'); btn.textContent = '\u00d7'; }, 2500);
        }
      });
    });
  }

  let saveTimer = null;
  function persist(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try { if (window.storage && window.storage.set) await window.storage.set(STORAGE_KEY, JSON.stringify(state)); }
      catch(e){ /* storage unavailable */ }
    }, 300);
  }

  async function loadState(){
    try {
      if (window.storage && window.storage.get){
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value){
          const parsed = JSON.parse(res.value);
          state = Object.assign({}, defaultState, parsed);
        }
      }
    } catch(e){ /* no saved state yet */ }
    render();
  }

  // ---- Month nav ----
  $('prevMonth').addEventListener('click', () => {
    viewMonth--; if (viewMonth < 0){ viewMonth = 11; viewYear--; }
    render();
  });
  $('nextMonth').addEventListener('click', () => {
    viewMonth++; if (viewMonth > 11){ viewMonth = 0; viewYear++; }
    render();
  });

  // ---- Tabs ----
  root.querySelectorAll('.tk-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      root.querySelectorAll('.tk-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      render();
    });
  });

  // ---- Add Transaction modal ----
  function openAddModal(){
    modalType = 'income';
    modalCategory = null;
    $('txAmount').value = '';
    $('txNote').value = '';
    $('txDate').value = new Date().toISOString().slice(0,10);
    $('newCatField').style.display = 'none';
    $('newCatInput').value = '';
    setModalType('income');
    $('addOverlay').classList.add('show');
  }
  function closeAddModal(){ $('addOverlay').classList.remove('show'); }

  function setModalType(type){
    modalType = type;
    $('toggleIncome').className = type==='income' ? 'sel income' : '';
    $('toggleExpense').className = type==='expense' ? 'sel expense' : '';
    renderCatChips();
  }

  function renderCatChips(){
    const cats = modalType === 'income' ? state.incomeCategories : state.expenseCategories;
    const grid = $('txCatChips');
    grid.innerHTML = '';
    cats.forEach(c => {
      const chip = document.createElement('button');
      chip.className = 'tk-chip' + (modalCategory === c ? ' sel' : '');
      chip.textContent = c;
      chip.addEventListener('click', () => {
        modalCategory = c;
        $('newCatField').style.display = 'none';
        renderCatChips();
      });
      grid.appendChild(chip);
    });
    const addChip = document.createElement('button');
    addChip.className = 'tk-chip add-new';
    addChip.textContent = '+ New';
    addChip.addEventListener('click', () => {
      modalCategory = null;
      $('newCatField').style.display = 'block';
      renderCatChips();
    });
    grid.appendChild(addChip);
  }

  $('openAdd').addEventListener('click', openAddModal);
  $('cancelAdd').addEventListener('click', closeAddModal);
  $('toggleIncome').addEventListener('click', () => setModalType('income'));
  $('toggleExpense').addEventListener('click', () => setModalType('expense'));

  $('saveAdd').addEventListener('click', () => {
    const amount = Number($('txAmount').value);
    if (!amount || amount <= 0){ $('txAmount').focus(); return; }
    let category = modalCategory;
    const newCatName = $('newCatInput').value.trim();
    if (!category && newCatName){
      category = newCatName;
      if (modalType === 'income') state.incomeCategories.push(category);
      else state.expenseCategories.push(category);
    }
    if (!category){ return; }
    const tx = {
      id: state.nextId++,
      type: modalType,
      amount: amount,
      category: category,
      note: $('txNote').value.trim(),
      date: $('txDate').value || new Date().toISOString().slice(0,10)
    };
    state.transactions.push(tx);
    persist();
    closeAddModal();
    const d = new Date(tx.date);
    viewYear = d.getFullYear(); viewMonth = d.getMonth();
    render();
  });

  // ---- Manage Categories modal ----
  function renderCatManager(){
    const incBox = $('incomeCatList');
    const expBox = $('expenseCatList');
    incBox.innerHTML = '';
    expBox.innerHTML = '';
    state.incomeCategories.forEach(c => {
      const row = document.createElement('div');
      row.className = 'tk-cat-item';
      row.innerHTML = '<span>'+c+'</span><button data-type="income" data-name="'+c+'">&times;</button>';
      incBox.appendChild(row);
    });
    state.expenseCategories.forEach(c => {
      const row = document.createElement('div');
      row.className = 'tk-cat-item';
      row.innerHTML = '<span>'+c+'</span><button data-type="expense" data-name="'+c+'">&times;</button>';
      expBox.appendChild(row);
    });
    root.querySelectorAll('#incomeCatList button, #expenseCatList button').forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type, name = btn.dataset.name;
        if (type === 'income') state.incomeCategories = state.incomeCategories.filter(c => c !== name);
        else state.expenseCategories = state.expenseCategories.filter(c => c !== name);
        persist();
        renderCatManager();
        render();
      });
    });
  }

  $('openCats').addEventListener('click', () => { renderCatManager(); $('catOverlay').classList.add('show'); });
  $('closeCats').addEventListener('click', () => $('catOverlay').classList.remove('show'));

  $('exportData').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const stamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = 'money-tracker-backup-' + stamp + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  $('importTrigger').addEventListener('click', () => $('importFile').click());

  $('importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!Array.isArray(parsed.transactions)) throw new Error('bad file');
        state = Object.assign({}, defaultState, parsed);
        persist();
        renderCatManager();
        render();
      } catch(err){
        $('importFile').value = '';
      }
    };
    reader.readAsText(file);
  });

  $('addIncomeCat').addEventListener('click', () => {
    const v = $('newIncomeCat').value.trim();
    if (v && !state.incomeCategories.includes(v)){
      state.incomeCategories.push(v);
      $('newIncomeCat').value = '';
      persist(); renderCatManager();
    }
  });
  $('addExpenseCat').addEventListener('click', () => {
    const v = $('newExpenseCat').value.trim();
    if (v && !state.expenseCategories.includes(v)){
      state.expenseCategories.push(v);
      $('newExpenseCat').value = '';
      persist(); renderCatManager();
    }
  });

  loadState();
})();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    });
  }
</script>
</body>
</html>
